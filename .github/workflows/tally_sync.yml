name: Tally.so Event Sync Service

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # Optional: speeds up future runs

      - name: Install dependencies
        run: npm install

      - name: Run custom script
        run: node scripts/tally_event_sync.js
        env:
          TALLY_API_KEY: ${{ secrets.TALLY_API_KEY }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Updated Event Sync json" && git push)
